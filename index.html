<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ketua Panitia | Peperiksaan Pertengahan 1 (Mac) 2026</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* ================= KOD CSS: REKA BENTUK UI ================= */
        :root {
            --night-blue: #151B54;
            --light-blue: #e0eafc;
            --gradient-bg: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --kp-accent: #0277bd; /* A slightly different accent for KP */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gradient-bg);
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        header {
            background-color: var(--night-blue);
            background-image: linear-gradient(135deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.05) 75%, transparent 75%, transparent);
            background-size: 40px 40px;
            color: white; 
            text-align: center; 
            padding: 30px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header img { max-height: 120px; margin-bottom: 15px; }
        header h1 { margin: 0; font-size: 2rem; letter-spacing: 1.5px; text-transform: uppercase; }
        header h2 { margin: 10px 0 0 0; font-weight: 300; font-size: 1.3rem; color: #81d4fa; }

        .container {
            flex: 1; width: 95%; max-width: 1400px; margin: 30px auto;
            background: rgba(255, 255, 255, 0.98); border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; overflow-x: auto;
        }

        /* Log Masuk */
        #login-section { display: flex; justify-content: center; padding: 60px 20px; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; border-top: 5px solid var(--kp-accent); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box;}
        button { background-color: var(--kp-accent); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px;}
        button:hover { background-color: #01579b; transform: translateY(-2px); }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;}
        .btn-group button { width: auto; padding: 10px 20px; font-size: 0.9rem;}
        .btn-logout { background-color: #d32f2f !important; } .btn-logout:hover { background-color: #b71c1c !important; }
        .btn-print { background-color: #00897b !important; } .btn-print:hover { background-color: #00695c !important; }

        .dashboard { display: none; }
        .tab-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--kp-accent); margin-bottom: 25px; padding-bottom: 15px; flex-wrap: wrap; gap:15px; }
        .tab-nav h2 { margin: 0; color: var(--night-blue); text-transform: uppercase; font-size: 1.5rem;}
        
        .admin-controls { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; display:flex; gap:15px; flex-wrap:wrap; justify-content:center; align-items:center; margin-bottom:20px;}
        .admin-controls select { width: 220px; margin: 0; }
        
        .radio-group { display: flex; gap: 15px; background: white; padding: 10px 20px; border-radius: 6px; border: 1px solid #ccc; }
        .radio-group label { font-weight: bold; cursor: pointer; color: var(--night-blue); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 10px 8px; text-align: center; vertical-align: middle; }
        th { background-color: var(--night-blue); color: white; font-weight: 600; white-space: nowrap; }
        tr:nth-child(even) { background-color: #f4f6fc; }
        tr:hover { background-color: #e8eaf6; }

        .null-mark { background-color: #ffebee !important; color: #c62828 !important; font-weight: bold; }
        .warning-text { color: #d32f2f; font-weight: bold; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stats-card { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid var(--kp-accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-card h3 { margin-top:0; color:var(--night-blue); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px;}

        .chart-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; justify-content: center; }
        .chart-box { background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 300px; max-width: 600px; }

        footer { text-align: center; padding: 20px; background-color: var(--night-blue); color: #d1d9ff; font-size: 0.95rem; margin-top: auto; letter-spacing: 1px; }

        /* KOD CSS: CETAKAN */
        @media print {
            @page { margin: 15mm; size: landscape; }
            body { background: white !important; color: black; }
            header, footer, .no-print, #login-section, .admin-controls, .chart-container { display: none !important; }
            .container { box-shadow: none; width: 100%; margin: 0; padding: 0; }
            .print-header { display: block !important; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #000; padding-bottom: 15px;}
            .print-header img { width: 100%; max-height: 120px; object-fit: contain; }
            table { font-size: 10pt; width: 100%; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th { background-color: #e0e0e0 !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            th, td { border: 1px solid black !important; padding: 5px !important; }
            .chart-container { display: flex !important; page-break-before: always; } /* Force charts on new page for printing if needed */
        }
        .print-header { display: none; }
        .print-area { display: none; }
        @media print { .print-area.active { display: block; } .dashboard-admin.hidden-print { display: none !important; } }
    </style>
</head>
<body>

    <header class="no-print">
        <img src="https://i.ibb.co/VYSKMXf1/Logo-Selirik.png" alt="Logo SMK Selirik">
        <h1>SMK SELIRIK, KAPIT</h1>
        <h2>Portal Ketua Panitia | Pertengahan 1 2026</h2>
    </header>

    <div class="container">
        <div id="login-section">
            <div class="login-box">
                <h2 style="color: var(--night-blue); margin-top:0;">Log Masuk KP</h2>
                <input type="text" id="userid" placeholder="ID Pengguna" required>
                <input type="password" id="password" placeholder="Kata Laluan" required>
                <button onclick="login()">Log Masuk</button>
                <p id="login-error" style="color:#d32f2f; display:none; font-size:0.9rem; margin-top:15px; font-weight:bold;">Kredensial tidak sah.</p>
            </div>
        </div>

        <div id="dashboard-admin" class="dashboard dashboard-admin">
            <div class="tab-nav no-print">
                <h2>Dashboard Ketua Panitia</h2>
                <div class="btn-group" style="margin-bottom:0;">
                    <button class="btn-logout" onclick="logout()">Keluar</button>
                </div>
            </div>
            
            <div class="admin-controls no-print">
                <select id="admin-tingkatan" onchange="loadData()">
                    <option value="">-- Pilih Tingkatan --</option>
                    <option value="1">Tingkatan 1</option>
                    <option value="2">Tingkatan 2</option>
                    <option value="3">Tingkatan 3</option>
                    <option value="4">Tingkatan 4</option>
                    <option value="5">Tingkatan 5</option>
                </select>
                
                <div class="radio-group" id="mod-paparan" style="display:none;">
                    <label><input type="radio" name="mod" value="subjek" onclick="tukarMod()" checked> Paparan Analisis Subjek</label>
                    <label><input type="radio" name="mod" value="cetak" onclick="tukarMod()"> Menu Cetakan</label>
                </div>
            </div>

            <div id="dynamic-controls" class="admin-controls no-print" style="display:none; background:white; border-color:var(--kp-accent);">
                </div>

            <div id="status-mesej" style="text-align:center; font-weight:bold; color:var(--night-blue); margin: 15px 0;" class="no-print"></div>

            <div id="admin-content"></div>

            <div id="chart-section" class="chart-container no-print" style="display:none;">
                <div class="chart-box"><canvas id="grafJantina"></canvas></div>
                <div class="chart-box"><canvas id="grafGred"></canvas></div>
            </div>
        </div>
        
        <div id="print-zone" class="print-area"></div>
    </div>

    <footer class="no-print">Hakcipta NDJE@Selirik, Kapit 2026</footer>

    <script>
        // --- 1. KONFIGURASI URL & PEMETAAN ---
        const csvUrls = {
            "1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9ngcL37KMX8ZDsGKomo7Lv6yowNqFdcWciJuvS1UkUU6aFHI_VKuFDLP1d0fKtMlXTW8APMYD38xZ/pub?gid=1419213935&single=true&output=csv",
            "2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSD6QwXil_0_gA0OBb2t82FneuCt68Sp7P9-He4zyBPEoaVHkJent8hiCSFPa33F-AEmR9BgeEogpt-/pub?gid=1419213935&single=true&output=csv",
            "3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg40cTCNS7MVyZVA3-8sZkbNtVT_Db9abxz6xhv1ccZ5ZksWIy0qyn8y30lqxG9G9YN1TOMBXF7WCY/pub?gid=1419213935&single=true&output=csv",
            "4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR831uDWcPfxf9zOj-mekolv_DMkdsYRMdVsxoLcKqwL88z-tetvP57ti5wB5M2dYIXYVZf9eX7R6Q8/pub?gid=1615224868&single=true&output=csv",
            "5": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq9lzeK5sombRvA2WRgEYGygUdZwEfifZHVy4IMZiRD7c-yll60qkA4pXeBBocqJsRV6GpM1uazU_B/pub?gid=1615224868&single=true&output=csv"
        };

        const col = (str) => { let c=0; for(let i=0;i<str.length;i++) c=c*26+(str.charCodeAt(i)-64); return c-1; };

        const mapAtas = {
            'BM':{m:col('E'), g:col('F')}, 'SEJ':{m:col('G'), g:col('H')}, 'ENG':{m:col('I'), g:col('J')},
            'MATHS':{m:col('K'), g:col('L')}, 'PM':{m:col('M'), g:col('N')}, 'PI':{m:col('O'), g:col('P')},
            'SN':{m:col('Q'), g:col('R')}, 'PSV':{m:col('S'), g:col('T')}, 'BIB':{m:col('U'), g:col('V')},
            'RC':{m:col('W'), g:col('X')}, 'PP':{m:col('Y'), g:col('Z')}, 'FIZ':{m:col('AA'), g:col('AB')},
            'KIM':{m:col('AC'), g:col('AD')}, 'BIO':{m:col('AE'), g:col('AF')}, 'ADD MATHS':{m:col('AG'), g:col('AH')},
            'SK':{m:col('AI'), g:col('AJ')}, 'KAG':{m:col('AK'), g:col('AL')}, 'PJPK':{m:col('BK'), g:col('BL')}
        };
        const mapRendah = {
            'BM':{m:col('E'), g:col('F')}, 'ENG':{m:col('G'), g:col('H')}, 'MATHS':{m:col('I'), g:col('J')},
            'SEJ':{m:col('K'), g:col('L')}, 'SN':{m:col('M'), g:col('N')}, 'GEO':{m:col('O'), g:col('P')},
            'BIB':{m:col('Q'), g:col('R')}, 'PM':{m:col('S'), g:col('T')}, 'PI':{m:col('U'), g:col('V')},
            'RBT':{m:col('W'), g:col('X')}, 'ASK':{m:col('Y'), g:col('Z')}, 'PSV':{m:col('AA'), g:col('AB')},
            'PJPK':{m:col('AO'), g:col('AP')}
        };

        let state = { data: [], ting: '', mod: 'subjek', charts: [], headers: [], currentStats: null };

        // --- 2. SISTEM LOG MASUK ---
        function login() {
            const id = document.getElementById('userid').value;
            const pass = document.getElementById('password').value;
            if (id === 'KP7102' && pass === 'KP7102') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-admin').style.display = 'block';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
        function logout() { location.reload(); }

        // --- 3. MUAT TURUN DATA ---
        function loadData() {
            state.ting = document.getElementById('admin-tingkatan').value;
            if(!state.ting) { document.getElementById('mod-paparan').style.display = 'none'; return; }
            
            document.getElementById('status-mesej').innerText = "Memuat turun data...";
            document.getElementById('admin-content').innerHTML = '';
            document.getElementById('dynamic-controls').style.display = 'none';
            document.getElementById('chart-section').style.display = 'none';
            
            Papa.parse(csvUrls[state.ting], {
                download: true,
                complete: function(res) {
                    state.data = res.data;
                    state.headers = res.data[0];
                    document.getElementById('status-mesej').innerText = "Data sedia. Sila pilih mod paparan.";
                    document.getElementById('mod-paparan').style.display = 'flex';
                    tukarMod();
                }
            });
        }

        // --- 4. LOGIK TAPISAN SUBJEK MENGIKUT KELAS ---
        function dapatkanSubjekKelas(kelas) {
            let k = kelas.toUpperCase();
            if (k.includes('4SN') || k.includes('5SN')) return ['BM','SEJ','ENG','MATHS','PM','PI','BIB','FIZ','KIM','BIO','ADD MATHS','SK','PJPK'];
            if (k.includes('4ST1') || k.includes('5ST1')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','BIB','RC','PP','PJPK'];
            if (k.includes('5ST2')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','BIB','RC','PJPK'];
            if (k.includes('5ST3')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','PSV','RC','PJPK'];
            if (k.includes('4ST2') || k.includes('4ST3')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','PSV','BIB','RC','PJPK'];
            if (k==='4A1'||k==='4A2'||k==='4A3'||k==='4A4'||k==='5A1'||k==='5A3'||k==='5A4') return ['BM','SEJ','ENG','MATHS','PM','PI','SN','PSV','PJPK'];
            if (k==='5A2') return ['BM','SEJ','ENG','MATHS','PM','SN','PSV','BIB','PJPK'];
            if (k.includes('4KAG') || k.includes('5KAG')) return ['BM','SEJ','ENG','MATHS','PM','SN','KAG','PJPK'];
            if (k==='1A1'||k==='2A1'||k==='3A1') return ['BM','ENG','MATHS','SEJ','SN','GEO','BIB','PM','PI','ASK','PSV','PJPK'];
            if (k==='1A5'||k==='2A5'||k==='3A5') return ['BM','ENG','MATHS','SEJ','SN','GEO','BIB','PM','PI','RBT','PSV','PJPK'];
            return ['BM','ENG','MATHS','SEJ','SN','GEO','BIB','PM','RBT','PSV','PJPK']; // Default Rendah
        }

        // Skor Gred (Nilai Standard)
        function skorGred(gred) {
            let g = gred.trim().toUpperCase();
            if(g==='A+') return 0; if(g==='A') return 1; if(g==='A-') return 2;
            if(g==='B+') return 3; if(g==='B') return 4; if(g==='C+') return 5;
            if(g==='C') return 6; if(g==='D') return 7; if(g==='E') return 8; if(g==='G') return 9;
            return null;
        }

        // --- 5. PENGURUSAN MOD PAPARAN ---
        function tukarMod() {
            let modChecked = document.querySelector('input[name="mod"]:checked').value;
            state.mod = modChecked;
            let dc = document.getElementById('dynamic-controls');
            dc.style.display = 'flex';
            dc.innerHTML = '';
            document.getElementById('admin-content').innerHTML = '';
            document.getElementById('chart-section').style.display = 'none';
            document.getElementById('status-mesej').innerText = '';

            if (modChecked === 'subjek') {
                let mSubjek = (state.ting === '4' || state.ting === '5') ? mapAtas : mapRendah;
                let html = '<select id="pilih-subjek" onchange="analisisSubjekKP()"><option value="">-- Pilih Subjek Untuk Dipantau --</option>';
                Object.keys(mSubjek).forEach(k => html += `<option value="${k}">${k}</option>`);
                html += '</select>';
                dc.innerHTML = html;
            }
            else if (modChecked === 'cetak') {
                if(!state.currentStats) {
                    dc.innerHTML = '<p class="warning-text">Sila pilih subjek di tab "Paparan Analisis Subjek" terlebih dahulu untuk menjana laporan khusus subjek.</p>';
                } else {
                    dc.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:10px; width:100%;">
                            <button class="btn-print" onclick="cetakLaporanKP(1)">1. ANALISIS PENCAPAIAN PELAJAR MENGIKUT KELAS</button>
                            <button class="btn-print" onclick="cetakLaporanKP(2)">2. ANALISIS RANK PELAJAR MENGIKUT SUBJEK</button>
                            <button class="btn-print" onclick="cetakLaporanKP(3)">3. ANALISIS PENCAPAIAN BERDASARKAN GRED (A+, A... TH) & GPMP</button>
                            <button class="btn-print" onclick="cetakLaporanKP(4)">4. ANALISIS PENCAPAIAN MURID MENGIKUT JANTINA</button>
                            <button class="btn-print" onclick="cetakLaporanKP(5)">5. GRAF PENCAPAIAN SUBJEK</button>
                            <button class="btn-print" onclick="cetakLaporanKP(6)">6. ANALISIS PELAJAR GAGAL BAHASA MELAYU DAN SEJARAH</button>
                        </div>
                    `;
                }
            }
        }

        // --- 6. FUNGSI UTAMA: ANALISIS SUBJEK OLEH KP ---
        function analisisSubjekKP() {
            let subjek = document.getElementById('pilih-subjek').value;
            if(!subjek) return;
            
            let isAtas = (state.ting === '4' || state.ting === '5');
            let mapData = (isAtas ? mapAtas : mapRendah)[subjek];
            
            let pelajar = state.data.slice(1).filter(r => r[col('C')]);
            
            let stats = {
                subjek: subjek,
                calonDaftar: 0, calonHadir: 0, lulus: 0, gagal: 0, 
                lelaki: { ambil:0, lulus:0 }, perempuan: { ambil:0, lulus:0 },
                gredCount: { 'A+':0, 'A':0, 'A-':0, 'B+':0, 'B':0, 'C+':0, 'C':0, 'D':0, 'E':0, 'G':0, 'TH':0 },
                kelasStats: {}, // Menyimpan maklumat mengikut kelas
                pelajarList: [],
                sumGP: 0, validGP: 0
            };

            pelajar.forEach((m) => {
                let k = m[col('D')];
                if(!k || !dapatkanSubjekKelas(k.trim()).includes(subjek)) return;
                
                let kelasName = k.trim();
                if(!stats.kelasStats[kelasName]) {
                    stats.kelasStats[kelasName] = { daftar:0, hadir:0, nullCount:0, sumGP:0, validGP:0 };
                }

                stats.calonDaftar++;
                stats.kelasStats[kelasName].daftar++;
                
                let jantina = m[col('DB')] ? m[col('DB')].trim().toUpperCase() : '-';
                if(jantina === 'L') stats.lelaki.ambil++;
                if(jantina === 'P') stats.perempuan.ambil++;

                let mark = m[mapData.m];
                let gredRaw = m[mapData.g];
                let gred = gredRaw ? gredRaw.trim().toUpperCase() : '';
                
                let objPelajar = { nama: m[col('C')], kelas: kelasName, jantina: jantina, markah: mark, gred: gred };

                if(!mark || mark === 'NULL' || mark === '') {
                    stats.kelasStats[kelasName].nullCount++;
                    objPelajar.status = 'NULL';
                } else if(mark === 'TH' || gred === 'TH') {
                    stats.gredCount['TH']++;
                    objPelajar.status = 'TH';
                } else {
                    stats.calonHadir++;
                    stats.kelasStats[kelasName].hadir++;
                    objPelajar.status = 'HADIR';
                    
                    let s = skorGred(gred);
                    if(s !== null) {
                        stats.sumGP += s;
                        stats.validGP++;
                        stats.kelasStats[kelasName].sumGP += s;
                        stats.kelasStats[kelasName].validGP++;
                        
                        if(stats.gredCount[gred] !== undefined) stats.gredCount[gred]++;
                        
                        // Lulus Gagal (Gred G atau E bergantung KSSM. Default: Gagal = G, Lulus = A-E. Bagi menengah rendah, G=Gagal)
                        if(gred === 'G' || gred === 'E' || gred === 'F') stats.gagal++; 
                        else {
                            stats.lulus++;
                            if(jantina === 'L') stats.lelaki.lulus++;
                            if(jantina === 'P') stats.perempuan.lulus++;
                        }
                    }
                }
                stats.pelajarList.push(objPelajar);
            });

            state.currentStats = stats; // Simpan untuk cetakan

            let gpmpKeseluruhan = stats.validGP > 0 ? (stats.sumGP / stats.validGP).toFixed(2) : '0.00';
            let peratusLulus = stats.calonHadir > 0 ? ((stats.lulus / stats.calonHadir) * 100).toFixed(2) : '0.00';

            // --- BINA PAPARAN HTML ---
            let html = `
                <div class="stats-grid">
                    <div class="stats-card">
                        <h3>Rumusan ${subjek}</h3>
                        <p>Calon Daftar: <b>${stats.calonDaftar}</b></p>
                        <p>Calon Hadir: <b>${stats.calonHadir}</b></p>
                        <p>Lulus: <b style="color:green;">${stats.lulus} (${peratusLulus}%)</b></p>
                        <p>GPMP: <b>${gpmpKeseluruhan}</b></p>
                    </div>
                    <div class="stats-card">
                        <h3>Taburan Gred</h3>
                        <p style="font-size:0.9rem;">
                            A+: ${stats.gredCount['A+']} | A: ${stats.gredCount['A']} | A-: ${stats.gredCount['A-']}<br>
                            B+: ${stats.gredCount['B+']} | B: ${stats.gredCount['B']}<br>
                            C+: ${stats.gredCount['C+']} | C: ${stats.gredCount['C']}<br>
                            D: ${stats.gredCount['D']} | E: ${stats.gredCount['E']} | G: ${stats.gredCount['G']}<br>
                            TH: ${stats.gredCount['TH']}
                        </p>
                    </div>
                    <div class="stats-card">
                        <h3>Status Kemasukan Markah (NULL)</h3>
                        <ul style="padding-left:20px; font-size:0.9rem; margin-top:5px;">
            `;
            
            let totalNull = 0;
            Object.keys(stats.kelasStats).sort().forEach(k => {
                let nc = stats.kelasStats[k].nullCount;
                if(nc > 0) {
                    html += `<li class="warning-text">${k} : ${nc} murid belum diisi</li>`;
                    totalNull += nc;
                }
            });
            if(totalNull === 0) html += `<li style="color:green; font-weight:bold;">Semua markah telah diisi!</li>`;
            
            html += `</ul></div></div>`;

            // Jadual Senarai Pelajar
            html += `<h3>Senarai Terperinci Pelajar (${subjek})</h3>
                     <div style="overflow-x:auto;">
                     <table><tr><th>Bil</th><th style="text-align:left;">Nama Pelajar</th><th>Kelas</th><th>Jantina</th><th>Markah</th><th>Gred</th></tr>`;
            
            // Susun pelajar: NULL di atas, kemudian ikut markah (jika ada)
            stats.pelajarList.sort((a,b) => {
                if(a.status === 'NULL' && b.status !== 'NULL') return -1;
                if(a.status !== 'NULL' && b.status === 'NULL') return 1;
                let mA = parseFloat(a.markah) || 0; let mB = parseFloat(b.markah) || 0;
                return mB - mA; // Descending
            });

            stats.pelajarList.forEach((p, i) => {
                let rowStyle = p.status === 'NULL' ? "class='null-mark'" : "";
                let mPaparan = p.status === 'NULL' ? 'KOSONG' : p.markah;
                html += `<tr ${rowStyle}><td>${i+1}</td><td style="text-align:left;">${p.nama}</td><td>${p.kelas}</td><td>${p.jantina}</td><td>${mPaparan}</td><td>${p.gred||'-'}</td></tr>`;
            });
            html += `</table></div>`;

            document.getElementById('admin-content').innerHTML = html;
            lukisGrafKP(stats);
            
            // Kemaskini menu radio cetakan supaya amaran hilang
            document.querySelector('input[value="subjek"]').click();
        }

        // --- 7. GRAFIK KETUA PANITIA ---
        function lukisGrafKP(stats) {
            document.getElementById('chart-section').style.display = 'flex';
            state.charts.forEach(c => c.destroy());
            state.charts = [];

            let ctx1 = document.getElementById('grafJantina').getContext('2d');
            state.charts.push(new Chart(ctx1, {
                type: 'pie',
                data: { labels: ['Lelaki', 'Perempuan'], datasets: [{ data: [stats.lelaki.ambil, stats.perempuan.ambil], backgroundColor: ['#151B54', '#d81b60'] }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Pecahan Jantina' } } }
            }));
            
            let ctx2 = document.getElementById('grafGred').getContext('2d');
            let gLabels = ['A+', 'A', 'A-', 'B+', 'B', 'C+', 'C', 'D', 'E', 'G', 'TH'];
            let gData = gLabels.map(g => stats.gredCount[g]);
            state.charts.push(new Chart(ctx2, {
                type: 'bar',
                data: { labels: gLabels, datasets: [{ label:'Bil Pelajar', data: gData, backgroundColor: '#0277bd' }] },
                options: { responsive: true, plugins: { title: { display: true, text: `Taburan Gred Subjek ${stats.subjek}` } } }
            }));
        }

        // --- 8. LOGIK CETAKAN LAPORAN KETUA PANITIA ---
        function cetakLaporanKP(jenisID) {
            let tajuk = [
                "",
                "ANALISIS PENCAPAIAN PELAJAR MENGIKUT KELAS",
                "ANALISIS RANK PELAJAR MENGIKUT SUBJEK",
                "ANALISIS PENCAPAIAN BERDASARKAN GRED DAN GPMP",
                "ANALISIS PENCAPAIAN MURID MENGIKUT JANTINA",
                "GRAF PENCAPAIAN SUBJEK MENGIKUT TABURAN PELAJAR",
                "ANALISIS PELAJAR GAGAL BAHASA MELAYU DAN SEJARAH"
            ];
            
            let s = state.currentStats;
            let reportHTML = `
                <div class="print-header">
                    <img src="https://i.ibb.co/670hn3CB/smk-selirik.png" alt="Header">
                    <h2 style="margin: 10px 0;">${tajuk[jenisID]}</h2>
                    <p>Tingkatan ${state.ting} | Portal Ketua Panitia | Pertengahan 1 2026</p>
                </div>
            `;
            
            if(jenisID === 1) {
                // PENCAPAIAN PELAJAR MENGIKUT KELAS
                reportHTML += `<h3>Subjek: ${s.subjek}</h3><table><tr><th>Kelas</th><th>Calon Daftar</th><th>Hadir</th><th>Markah Belum Isi (NULL)</th><th>GP Kelas</th></tr>`;
                Object.keys(s.kelasStats).sort().forEach(k => {
                    let ks = s.kelasStats[k];
                    let gp = ks.validGP > 0 ? (ks.sumGP/ks.validGP).toFixed(2) : '-';
                    reportHTML += `<tr><td>${k}</td><td>${ks.daftar}</td><td>${ks.hadir}</td><td>${ks.nullCount}</td><td>${gp}</td></tr>`;
                });
                reportHTML += `</table>`;
            }
            else if(jenisID === 2) {
                // RANK PELAJAR MENGIKUT SUBJEK
                let rankList = [...s.pelajarList].filter(p => p.status === 'HADIR').sort((a,b) => parseFloat(b.markah) - parseFloat(a.markah));
                reportHTML += `<h3>Subjek: ${s.subjek} (Disusun Mengikut Markah)</h3><table><tr><th>Rank</th><th style="text-align:left;">Nama</th><th>Kelas</th><th>Markah</th><th>Gred</th></tr>`;
                rankList.forEach((p, i) => {
                    reportHTML += `<tr><td>${i+1}</td><td style="text-align:left;">${p.nama}</td><td>${p.kelas}</td><td>${p.markah}</td><td>${p.gred}</td></tr>`;
                });
                reportHTML += `</table>`;
            }
            else if(jenisID === 3) {
                // PENCAPAIAN GRED & GPMP
                let pct = s.calonHadir > 0 ? ((s.lulus/s.calonHadir)*100).toFixed(2) : '0.00';
                let gpmp = s.validGP > 0 ? (s.sumGP/s.validGP).toFixed(2) : '0.00';
                reportHTML += `
                    <h3>Rumusan Subjek: ${s.subjek}</h3>
                    <table style="width:100%; text-align:center;">
                        <tr><th>Daftar</th><th>Hadir</th><th>Lulus</th><th>% Lulus</th><th>Gagal</th><th>GPMP</th></tr>
                        <tr><td>${s.calonDaftar}</td><td>${s.calonHadir}</td><td>${s.lulus}</td><td>${pct}%</td><td>${s.gagal}</td><td><b>${gpmp}</b></td></tr>
                    </table><br>
                    <h3>Pecahan Gred</h3>
                    <table>
                        <tr><th>A+</th><th>A</th><th>A-</th><th>B+</th><th>B</th><th>C+</th><th>C</th><th>D</th><th>E</th><th>G</th><th>TH</th></tr>
                        <tr>
                            <td>${s.gredCount['A+']}</td><td>${s.gredCount['A']}</td><td>${s.gredCount['A-']}</td>
                            <td>${s.gredCount['B+']}</td><td>${s.gredCount['B']}</td><td>${s.gredCount['C+']}</td>
                            <td>${s.gredCount['C']}</td><td>${s.gredCount['D']}</td><td>${s.gredCount['E']}</td>
                            <td>${s.gredCount['G']}</td><td>${s.gredCount['TH']}</td>
                        </tr>
                    </table>
                `;
            }
            else if(jenisID === 4) {
                // JANTINA
                let pctL = s.lelaki.ambil > 0 ? ((s.lelaki.lulus/s.lelaki.ambil)*100).toFixed(2) : '0.00';
                let pctP = s.perempuan.ambil > 0 ? ((s.perempuan.lulus/s.perempuan.ambil)*100).toFixed(2) : '0.00';
                reportHTML += `
                    <h3>Analisis Jantina: ${s.subjek}</h3>
                    <table>
                        <tr><th>Jantina</th><th>Calon Ambil</th><th>Bil Lulus</th><th>% Lulus</th></tr>
                        <tr><td>Lelaki</td><td>${s.lelaki.ambil}</td><td>${s.lelaki.lulus}</td><td>${pctL}%</td></tr>
                        <tr><td>Perempuan</td><td>${s.perempuan.ambil}</td><td>${s.perempuan.lulus}</td><td>${pctP}%</td></tr>
                    </table>
                `;
            }
            else if(jenisID === 5) {
                // GRAF (Print Zone) - Memerlukan salinan kanvas graf
                reportHTML += `<h3>Sila cetak terus dari paparan skrin untuk graf bagi mengekalkan resolusi tinggi.</h3>`;
                // Technically, window.print() handles canvas natively, we just unhide the chart-container.
                // We will handled it below by injecting it.
            }
            else if(jenisID === 6) {
                // GAGAL BM & SEJARAH (Sama seperti Admin, lintas-pangkalan data)
                let isAtas = (state.ting === '4' || state.ting === '5');
                let colBM = (isAtas ? mapAtas : mapRendah)['BM'].g;
                let colSEJ = (isAtas ? mapAtas : mapRendah)['SEJ'].g;
                let failList = [];
                state.data.slice(1).forEach(m => {
                    if(!m[col('C')]) return;
                    let gBM = m[colBM] ? m[colBM].trim().toUpperCase() : '';
                    let gSEJ = m[colSEJ] ? m[colSEJ].trim().toUpperCase() : '';
                    let failBM = (gBM==='G'||gBM==='E'||gBM==='F');
                    let failSEJ = (gSEJ==='G'||gSEJ==='E'||gSEJ==='F');
                    if(failBM && failSEJ) failList.push({nama: m[col('C')], kelas: m[col('D')], gBM, gSEJ});
                });
                
                reportHTML += `<h3>Senarai Murid Gagal BM & Sejarah</h3><table><tr><th>Bil</th><th style="text-align:left;">Nama</th><th>Kelas</th><th>Gred BM</th><th>Gred SEJ</th></tr>`;
                if(failList.length === 0) reportHTML += `<tr><td colspan="5">Tiada pelajar gagal kedua-dua subjek.</td></tr>`;
                else failList.forEach((p,i) => reportHTML += `<tr><td>${i+1}</td><td style="text-align:left;">${p.nama}</td><td>${p.kelas}</td><td>${p.gBM}</td><td>${p.gSEJ}</td></tr>`);
                reportHTML += `</table>`;
            }
            
            document.getElementById('print-zone').innerHTML = reportHTML;
            document.getElementById('print-zone').classList.add('active');
            
            if(jenisID !== 5) {
                document.getElementById('dashboard-admin').classList.add('hidden-print');
            }

            alert("PENTING: Sila pastikan tetapan cetakan adalah pada saiz A4 dan orientasi bersesuaian (Landscape disyorkan).");
            window.print();
            
            setTimeout(() => {
                document.getElementById('print-zone').classList.remove('active');
                document.getElementById('dashboard-admin').classList.remove('hidden-print');
            }, 500);
        }
    </script>
</body>
</html>
